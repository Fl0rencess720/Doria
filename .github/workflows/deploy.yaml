name: Monorepo CI - Build and Push

on:
  push:
    branches:
      - deploy
    paths:
      - 'src/**'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/**'

env:
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  detect-changes:
    name: 检测变更
    runs-on: ubuntu-latest
    outputs:
      gateway: ${{ steps.changes.outputs.gateway }}
      image: ${{ steps.changes.outputs.image }}
      mate: ${{ steps.changes.outputs.mate }}
      memory: ${{ steps.changes.outputs.memory }}
      tts: ${{ steps.changes.outputs.tts }}
      user: ${{ steps.changes.outputs.user }}
      common_changed: ${{ steps.changes.outputs.common_changed }}
      services_to_build: ${{ steps.set-matrix.outputs.services }}
      
    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  

      - name: 检测文件变更
        uses: dorny/paths-filter@v2
        id: changes
        with:
          filters: |
            common:
              - 'src/common/**'
              - 'src/consts/**'
              - 'src/idl/**'
              - 'src/rpc/**'
              - 'go.mod'
              - 'go.sum'
            gateway:
              - 'src/gateway/**'
            image:
              - 'src/services/image/**'
            mate:
              - 'src/services/mate/**'
            memory:
              - 'src/services/memory/**'
            tts:
              - 'src/services/tts/**'
            user:
              - 'src/services/user/**'

      - name: 设置公共代码变更标志
        id: set-common
        run: |
          if [[ "${{ steps.changes.outputs.common }}" == "true" ]]; then
            echo "common_changed=true" >> $GITHUB_OUTPUT
            echo "🔄 检测到公共代码变更，将构建所有服务"
          else
            echo "common_changed=false" >> $GITHUB_OUTPUT
            echo "✅ 公共代码未变更"
          fi

      - name: 构建服务矩阵
        id: set-matrix
        run: |
          services=()
          
          # 如果公共代码变更，构建所有服务
          if [[ "${{ steps.changes.outputs.common }}" == "true" ]]; then
            echo "🔄 公共代码变更，添加所有服务到构建列表"
            services=("gateway" "image" "mate" "memory" "tts" "user")
          else
            # 否则只构建变更的服务
            [[ "${{ steps.changes.outputs.gateway }}" == "true" ]] && services+=("gateway")
            [[ "${{ steps.changes.outputs.image }}" == "true" ]] && services+=("image")
            [[ "${{ steps.changes.outputs.mate }}" == "true" ]] && services+=("mate")
            [[ "${{ steps.changes.outputs.memory }}" == "true" ]] && services+=("memory")
            [[ "${{ steps.changes.outputs.tts }}" == "true" ]] && services+=("tts")
            [[ "${{ steps.changes.outputs.user }}" == "true" ]] && services+=("user")
          fi
          
          # 转换为 JSON 数组
          if [ ${#services[@]} -eq 0 ]; then
            echo "services=[]" >> $GITHUB_OUTPUT
            echo "⏭️  没有服务需要构建"
          else
            json_array=$(printf '%s\n' "${services[@]}" | jq -R . | jq -s -c .)
            echo "services=$json_array" >> $GITHUB_OUTPUT
            echo "🏗️  需要构建的服务: ${services[*]}"
          fi

      - name: 输出变更摘要
        run: |
          echo "### 📊 变更检测结果" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 组件 | 状态 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| 公共代码 | ${{ steps.changes.outputs.common == 'true' && '🔄 已变更' || '✅ 未变更' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Gateway | ${{ steps.changes.outputs.gateway == 'true' && '🔄 已变更' || '✅ 未变更' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Image 服务 | ${{ steps.changes.outputs.image == 'true' && '🔄 已变更' || '✅ 未变更' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Mate 服务 | ${{ steps.changes.outputs.mate == 'true' && '🔄 已变更' || '✅ 未变更' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Memory 服务 | ${{ steps.changes.outputs.memory == 'true' && '🔄 已变更' || '✅ 未变更' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| TTS 服务 | ${{ steps.changes.outputs.tts == 'true' && '🔄 已变更' || '✅ 未变更' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| User 服务 | ${{ steps.changes.outputs.user == 'true' && '🔄 已变更' || '✅ 未变更' }} |" >> $GITHUB_STEP_SUMMARY

  build-and-push:
    name: 构建镜像
    needs: detect-changes
    if: needs.detect-changes.outputs.services_to_build != '[]'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services_to_build) }}
      fail-fast: false
    
    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 设置服务路径
        id: set-path
        run: |
          if [[ "${{ matrix.service }}" == "gateway" ]]; then
            echo "dockerfile_path=src/gateway/Dockerfile" >> $GITHUB_OUTPUT
            echo "context_path=." >> $GITHUB_OUTPUT
          else
            echo "dockerfile_path=src/services/${{ matrix.service }}/Dockerfile" >> $GITHUB_OUTPUT
            echo "context_path=." >> $GITHUB_OUTPUT
          fi

      - name: 设置镜像标签
        id: meta
        run: |
          # 使用 Git SHA 短码作为标签
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          
          # deploy 分支固定使用 prod 环境标签
          ENV_TAG="prod"
          
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "env_tag=$ENV_TAG" >> $GITHUB_OUTPUT
          echo "image_name=${{ secrets.DOCKER_REGISTRY }}/fl0rencess-doria/${{ matrix.service }}" >> $GITHUB_OUTPUT

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录到 GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 构建并推送 Docker 镜像
        uses: docker/build-push-action@v5
        with:
          context: ${{ steps.set-path.outputs.context_path }}
          file: ${{ steps.set-path.outputs.dockerfile_path }}
          push: true
          tags: |
            ${{ steps.meta.outputs.image_name }}:${{ steps.meta.outputs.short_sha }}
            ${{ steps.meta.outputs.image_name }}:${{ steps.meta.outputs.env_tag }}
            ${{ steps.meta.outputs.image_name }}:latest
          labels: |
            org.opencontainers.image.title=${{ matrix.service }}
            org.opencontainers.image.description=${{ matrix.service }} service
            org.opencontainers.image.source=${{ github.repositoryUrl }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

      - name: 输出镜像信息
        run: |
          echo "### 🐳 镜像构建成功: ${{ matrix.service }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**镜像标签:**" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ steps.meta.outputs.image_name }}:${{ steps.meta.outputs.short_sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ steps.meta.outputs.image_name }}:${{ steps.meta.outputs.env_tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ steps.meta.outputs.image_name }}:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Git SHA:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY

  build-summary:
    name: 构建摘要
    needs: [detect-changes, build-and-push]
    if: always()
    runs-on: ubuntu-latest
    
    steps:
      - name: 生成构建摘要
        run: |
          echo "## 🎉 CI 流程完成" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [[ "${{ needs.detect-changes.outputs.services_to_build }}" == "[]" ]]; then
            echo "✅ 没有服务需要构建" >> $GITHUB_STEP_SUMMARY
          else
            echo "### 构建的服务列表" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '${{ needs.detect-changes.outputs.services_to_build }}' | jq -r '.[]' | while read service; do
              echo "- ✅ $service" >> $GITHUB_STEP_SUMMARY
            done
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 下一步" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "⏭️  镜像已推送到 registry，等待配置 ArgoCD 部署流程" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📌 提交 SHA: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "🌿 分支: \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY